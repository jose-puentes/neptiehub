    <nav class="navbar">
      <a href="index.html" class="logo neptie-wordmark">Neptie</a>
      <button class="mobile-menu-toggle" id="mobile-menu-toggle" type="button" aria-label="Menu">☰</button>
      <div class="nav-links" id="nav-links">
